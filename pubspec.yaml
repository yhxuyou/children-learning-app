name: children_learning_app
description: "A Flutter app for children to learn Chinese characters and English."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  go_router: ^14.2.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  flutter_tts: ^4.0.2
  http: ^1.2.1
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/english_words.csv
    - assets/audio/
